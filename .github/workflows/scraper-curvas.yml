name: Scraper Curvas ONs

on:
  schedule:
    # 13:00 UTC = 10:00 ART (UTC-3), lunes a viernes
    - cron: '0 13 * * 1-5'
  workflow_dispatch:  # permite correrlo manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pdfplumber requests

      - name: Run scraper
        run: python scraper_curvas.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add curvas_on.csv curvas_last_id.txt
          if git diff --cached --quiet; then
            echo "Sin cambios — no hay informe nuevo todavia"
          else
            FECHA=$(date +'%d/%m/%Y')
            git commit -m "update curvas_on.csv: informe PPI $FECHA"
            git push
          fi
